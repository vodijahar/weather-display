name: Build Raspberry Pi Weather Image

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      base_image_url:
        description: "Raspberry Pi OS Lite image URL"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      DEFAULT_BASE_IMAGE_URL: https://downloads.raspberrypi.com/raspios_lite_armhf/images/raspios_lite_armhf-2026-04-21/2026-04-21-raspios-trixie-armhf-lite.img.xz

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xz-utils \
            rsync \
            util-linux \
            e2fsprogs \
            qemu-user-static \
            binfmt-support

      - name: Download Raspberry Pi OS Lite 32-bit
        env:
          BASE_IMAGE_URL: ${{ github.event.inputs.base_image_url || vars.BASE_IMAGE_URL || env.DEFAULT_BASE_IMAGE_URL }}
        run: |
          mkdir -p base
          cd base

          echo "Downloading base image from ${BASE_IMAGE_URL}"
          curl --fail --location --retry 3 --retry-delay 5 \
            --output raspios.img.xz \
            "${BASE_IMAGE_URL}"

      - name: Clone Waveshare driver
        run: |
          git clone --depth 1 https://github.com/waveshare/e-Paper.git /tmp/e-Paper
          cp -r /tmp/e-Paper/RaspberryPi_JetsonNano/python/lib/waveshare_epd app/

      - name: Make build script executable
        run: chmod +x build-image.sh

      - name: Build image
        run: ./build-image.sh base/raspios.img.xz

      - name: Create SHA256 checksum
        run: |
          cd out
          sha256sum weather-display.img.xz > weather-display.img.xz.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-display-image
          path: |
            out/weather-display.img.xz
            out/weather-display.img.xz.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/weather-display.img.xz
            out/weather-display.img.xz.sha256
